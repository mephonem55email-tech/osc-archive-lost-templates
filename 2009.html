<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>2009</title>
<meta name="viewport" content="width=800, user-scalable=yes">
<style>
body {
    background-image: url("https://upload.wikimedia.org/wikipedia/commons/8/87/Checkerboard_pattern.png");
    font-family: Verdana, Arial;
}

#container {
    width: 900px; /* aumentei pra caber o iframe */
    margin: auto;
    border: 4px solid black;
    background-color: white;
}

/* HEADER */
#header img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* MENU */
#menu {
    background-color: #000080;
    text-align: center;
    padding: 10px;
}

#menu a {
    color: yellow;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* CONTEÚDO */
#content {
    display: flex;
}

/* SIDEBAR */
#sidebar {
    width: 320px; /* agora cabe o iframe inteiro */
    background-color: #e0e0ff;
    padding: 10px;
}

/* MAIN */
#main {
    width: 580px;
    padding: 15px;
}

/* FOOTER */
#footer img {
    width: 100%;
    height: 80px;
    object-fit: cover;
}

marquee {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="container">

    <!-- HEADER -->
    <div id="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg">

    <!-- MENU -->
    <div id="menu">

</div>

</html>
