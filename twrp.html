<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Win Recovery Project v2.7.0.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: "Droid Sans", "Roboto", "Segoe UI", sans-serif;
            color: #cccccc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            background-color: #333333;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 3px solid #00bfff;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            position: relative;
        }

        .logo::before {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #333333;
            top: 5px;
        }

        .logo::after {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid #333333;
            bottom: 5px;
        }

        .title-section {
            flex: 1;
        }

        .title {
            font-size: 18px;
            color: #ffffff;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .status-info {
            display: flex;
            gap: 30px;
            font-size: 16px;
            color: #ffffff;
            margin-top: 2px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            gap: 15px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex: 1;
        }

        .twrp-button {
            flex: 1;
            max-width: 280px;
            background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            border: 2px solid #555555;
            border-top: 3px solid #00bfff;
            color: #aaaaaa;
            font-size: 20px;
            text-transform: capitalize;
            cursor: pointer;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
        }

        .twrp-button:hover {
            background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%);
            color: #ffffff;
            border-color: #777777;
            border-top-color: #00ffff;
        }

        .twrp-button:active {
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            transform: scale(0.98);
        }

        /* Navigation Bar */
        .nav-bar {
            height: 70px;
            background-color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-top: 1px solid #333333;
        }

        .nav-button {
            background: none;
            border: 2px solid #666666;
            color: #888888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-button:hover {
            border-color: #aaaaaa;
            color: #ffffff;
        }

        .home-btn {
            width: 50px;
            height: 35px;
            border-radius: 8px;
        }

        .home-icon {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid currentColor;
            position: relative;
        }

        .home-icon::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 12px;
            background-color: currentColor;
            left: -10px;
            top: 20px;
        }

        .logs-btn {
            width: 50px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
            padding: 5px;
        }

        .log-line {
            height: 3px;
            background-color: currentColor;
            border-radius: 1px;
        }

        .log-line:nth-child(1) { width: 100%; }
        .log-line:nth-child(2) { width: 80%; }
        .log-line:nth-child(3) { width: 60%; }

        .back-btn {
            width: 50px;
            height: 35px;
            border-radius: 0 15px 15px 0;
            position: relative;
        }

        .back-btn::before {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            border-left: 3px solid currentColor;
            border-bottom: 3px solid currentColor;
            transform: rotate(45deg);
        }

        /* Modal/Overlay for button actions */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            border: 2px solid #00bfff;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }

        .modal-title {
            color: #00bfff;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #cccccc;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 25px;
            background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 100%);
            border: 2px solid #666666;
            border-top: 3px solid #00bfff;
            color: #ffffff;
            cursor: pointer;
            font-size: 16px;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .modal-btn:hover {
            background: linear-gradient(180deg, #5a5a5a 0%, #4a4a4a 100%);
        }

        .modal-btn.cancel {
            border-top-color: #ff6666;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .twrp-button {
                font-size: 16px;
            }
            .title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <div class="logo"></div>
        <div class="title-section">
            <div class="title">Team Win Recovery Project v2.7.0.0</div>
            <div class="status-info">
                <span id="time">3:29</span>
                <span>Battery: 100%</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="button-row">
            <button class="twrp-button" onclick="showModal('Install')">Install</button>
            <button class="twrp-button" onclick="showModal('Wipe')">Wipe</button>
        </div>
        <div class="button-row">
            <button class="twrp-button" onclick="showModal('Backup')">Backup</button>
            <button class="twrp-button" onclick="showModal('Restore')">Restore</button>
        </div>
        <div class="button-row">
            <button class="twrp-button" onclick="showModal('Mount')">Mount</button>
            <button class="twrp-button" onclick="showModal('Settings')">Settings</button>
        </div>
        <div class="button-row">
            <button class="twrp-button" onclick="showModal('Advanced')">Advanced</button>
            <button class="twrp-button" onclick="showModal('Reboot')">Reboot</button>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
        <button class="nav-button home-btn" onclick="goHome()" title="Home">
            <div class="home-icon"></div>
        </button>
        <button class="nav-button logs-btn" onclick="showLogs()" title="Logs">
            <div class="log-line"></div>
            <div class="log-line"></div>
            <div class="log-line"></div>
        </button>
        <button class="nav-button back-btn" onclick="goBack()" title="Back"></button>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">Action</div>
            <div class="modal-text" id="modal-text">Select an option to proceed.</div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="confirmAction()">Confirm</button>
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').textContent = hours + ':' + minutes;
        }
        updateTime();
        setInterval(updateTime, 60000);

        // Modal functions
        let currentAction = '';

        function showModal(action) {
            currentAction = action;
            document.getElementById('modal-title').textContent = action;

            const descriptions = {
                'Install': 'Select a ZIP file to flash to your device.',
                'Wipe': 'Wipe data, cache, dalvik, or factory reset.',
                'Backup': 'Create a backup of your current system.',
                'Restore': 'Restore from a previous backup.',
                'Mount': 'Mount or unmount partitions.',
                'Settings': 'Configure TWRP settings.',
                'Advanced': 'Advanced options like file manager and terminal.',
                'Reboot': 'Reboot system, recovery, or power off.'
            };

            document.getElementById('modal-text').textContent = descriptions[action] || 'Select an option to proceed.';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function confirmAction() {
            alert(currentAction + ' initiated! (This is a demo)');
            closeModal();
        }

        // Navigation functions
        function goHome() {
            closeModal();
            document.querySelectorAll('.twrp-button').forEach(btn => {
                btn.style.animation = 'none';
                setTimeout(() => {
                    btn.style.animation = '';
                }, 10);
            });
        }

        function showLogs() {
            alert('Log viewer would open here.\n\nShowing recovery logs...');
        }

        function goBack() {
            closeModal();
        }

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
